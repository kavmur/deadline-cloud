specificationVersion: 'jobtemplate-2023-09'
name: echo_with_attachment
description: Job bundle with input and output files for attachment and download testing
parameterDefinitions:
  - name: InputFile
    type: PATH
    objectType: FILE
    dataFlow: IN
    default: input.txt
  - name: OutputDir
    type: PATH
    objectType: DIRECTORY
    dataFlow: OUT
    default: output
steps:
  - name: Echo
    script:
      actions:
        onRun:
          command: '{{Task.File.run}}'
      embeddedFiles:
        - name: run
          filename: run.sh
          type: TEXT
          runnable: true
          data: |
            #!/bin/bash
            mkdir -p "{{Param.OutputDir}}"
            echo "Input file contents:" > "{{Param.OutputDir}}/result.txt"
            cat "{{Param.InputFile}}" >> "{{Param.OutputDir}}/result.txt"
